name: institutional-pipeline

on:

  workflow_dispatch:

  schedule:
    - cron: "30 2 * * *"

permissions:
  contents: write

jobs:

  institutional-pipeline:

    runs-on: ubuntu-latest

    timeout-minutes: 360

    steps:

      # =====================================================
      # CHECKOUT
      # =====================================================

      - name: Checkout Repository
        uses: actions/checkout@v4

      # =====================================================
      # PYTHON
      # =====================================================

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # =====================================================
      # CACHE
      # =====================================================

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # =====================================================
      # INSTALL DEPENDENCIES
      # =====================================================

      - name: Install Dependencies
        run: |

          python -m pip install --upgrade pip

          pip install -r requirements.txt

      # =====================================================
      # VERIFY PACKAGES
      # =====================================================

      - name: Verify Python Packages
        run: |

          python -c "import pandas; print('PANDAS OK')"

          python -c "import numpy; print('NUMPY OK')"

          python -c "import yfinance; print('YFINANCE OK')"

          python -c "import pyarrow; print('PYARROW OK')"

      # =====================================================
      # CREATE DATA DIRECTORIES
      # =====================================================

      - name: Create Data Directories
        run: |

          mkdir -p data/parquet
          mkdir -p data/raw
          mkdir -p data/cache

      # =====================================================
      # RUN PIPELINE
      # =====================================================

      - name: Run Institutional Pipeline
        run: |

          python -m pipelines.daily_pipeline

      # =====================================================
      # VERIFY OUTPUT FILES
      # =====================================================

      - name: Verify Generated Files
        run: |

          ls -lh data/parquet/

      # =====================================================
      # COMMIT GENERATED FILES
      # =====================================================

      - name: Commit Updated Files
        run: |

          git config --global user.name "github-actions[bot]"

          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add data/

          git diff --staged --quiet || git commit -m "Auto update institutional datasets"

      # =====================================================
      # PUSH CHANGES
      # =====================================================

      - name: Push Changes
        run: |

          git push
