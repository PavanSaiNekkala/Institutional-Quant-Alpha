name: Institutional Pipeline

on:
  workflow_dispatch:

  schedule:
    - cron: "30 2 * * *"

permissions:
  contents: write

concurrency:
  group: institutional-pipeline
  cancel-in-progress: false

jobs:

  institutional-pipeline:

    runs-on: ubuntu-latest

    timeout-minutes: 360

    strategy:
      fail-fast: false

      matrix:
        python-version: ["3.11"]

    steps:

      # =====================================================
      # CHECKOUT
      # =====================================================

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =====================================================
      # PYTHON
      # =====================================================

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      # =====================================================
      # SYSTEM INFO
      # =====================================================

      - name: Display Environment Info
        run: |

          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Python Version:"
          python --version

          echo ""
          echo "Current Directory:"
          pwd

          echo ""
          echo "Repository Structure:"
          ls -R

      # =====================================================
      # INSTALL DEPENDENCIES
      # =====================================================

      - name: Install Dependencies
        run: |

          python -m pip install --upgrade pip

          pip install -r requirements.txt

      # =====================================================
      # VERIFY PACKAGES
      # =====================================================

      - name: Verify Python Packages
        run: |

          python -c "import pandas; print('PANDAS OK')"
          python -c "import numpy; print('NUMPY OK')"
          python -c "import yfinance; print('YFINANCE OK')"
          python -c "import pyarrow; print('PYARROW OK')"

      # =====================================================
      # VERIFY PROJECT STRUCTURE
      # =====================================================

      - name: Verify Project Structure
        run: |

          echo "Checking required files..."

          test -f pipelines/daily_pipeline.py && echo "daily_pipeline.py OK"

          test -f pipelines/__init__.py || touch pipelines/__init__.py

          test -d strategy && echo "strategy folder OK"

          test -f strategy/__init__.py || touch strategy/__init__.py

          test -f strategy/trade_decision_engine.py && echo "trade_decision_engine.py OK"

      # =====================================================
      # CREATE DATA DIRECTORIES
      # =====================================================

      - name: Create Data Directories
        run: |

          mkdir -p data/parquet
          mkdir -p data/raw
          mkdir -p data/cache

      # =====================================================
      # FIX PYTHON IMPORTS
      # =====================================================

      - name: Set PYTHONPATH
        run: |

          echo "PYTHONPATH=${{ github.workspace }}" >> $GITHUB_ENV

      # =====================================================
      # RUN PIPELINE
      # =====================================================

      - name: Run Institutional Pipeline
        run: |

          python -m pipelines.daily_pipeline

      # =====================================================
      # VERIFY OUTPUT FILES
      # =====================================================

      - name: Verify Generated Files
        run: |

          echo "Generated Files:"
          find data -type f | sort || true

          echo ""
          echo "Parquet Files:"
          ls -lh data/parquet/ || true

      # =====================================================
      # GIT STATUS
      # =====================================================

      - name: Git Status
        run: |

          git status

      # =====================================================
      # COMMIT GENERATED FILES
      # =====================================================

      - name: Commit Updated Files
        run: |

          git config --global user.name "github-actions[bot]"

          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add data/

          git diff --staged --quiet || git commit -m "Auto update institutional datasets"

      # =====================================================
      # PUSH CHANGES
      # =====================================================

      - name: Push Changes
        run: |

          git push origin HEAD:${{ github.ref_name }}
