name: Institutional Pipeline

on:
  workflow_dispatch:

  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

concurrency:
  group: institutional-pipeline
  cancel-in-progress: false

jobs:

  institutional-pipeline:

    runs-on: ubuntu-latest

    timeout-minutes: 360

    strategy:
      fail-fast: false

      matrix:
        python-version: ["3.11"]

    steps:

      # =====================================================
      # CHECKOUT REPOSITORY
      # =====================================================

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =====================================================
      # SETUP PYTHON
      # =====================================================

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      # =====================================================
      # DISPLAY ENVIRONMENT INFO
      # =====================================================

      - name: Display Environment Info
        run: |

          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"

          echo ""
          echo "Python Version:"
          python --version

          echo ""
          echo "Current Working Directory:"
          pwd

          echo ""
          echo "Repository Files:"
          ls -R

      # =====================================================
      # INSTALL DEPENDENCIES
      # =====================================================

      - name: Install Dependencies
        run: |

          python -m pip install --upgrade pip

          pip install -r requirements.txt

      # =====================================================
      # VERIFY REQUIRED PACKAGES
      # =====================================================

      - name: Verify Python Packages
        run: |

          python -c "import pandas; print('PANDAS OK')"

          python -c "import numpy; print('NUMPY OK')"

          python -c "import yfinance; print('YFINANCE OK')"

          python -c "import pyarrow; print('PYARROW OK')"

      # =====================================================
      # CREATE REQUIRED STRUCTURE
      # =====================================================

      - name: Create Project Structure
        run: |

          mkdir -p pipelines
          mkdir -p strategy

          mkdir -p data/parquet
          mkdir -p data/raw
          mkdir -p data/cache
          mkdir -p data/processed

          touch pipelines/__init__.py
          touch strategy/__init__.py

      # =====================================================
      # REFRESH CACHE DATA
      # =====================================================

      - name: Refresh Cache Data
        run: |

          find data/cache -type f -mtime +1 -delete || true

      # =====================================================
      # VERIFY REQUIRED FILES
      # =====================================================

      - name: Verify Required Files
        run: |

          if [ ! -f pipelines/daily_pipeline.py ]; then

            echo "ERROR: pipelines/daily_pipeline.py NOT FOUND"

            exit 1

          fi

          if [ ! -f strategy/trade_decision_engine.py ]; then

            echo "Creating default trade_decision_engine.py"

            printf '%s\n' \
            '# =========================================================' \
            '# TRADE DECISION ENGINE' \
            '# =========================================================' \
            '' \
            'def trade_decision(row):' \
            '' \
            '    try:' \
            '' \
            '        institutional_score = row.get(' \
            '            "institutional_score",' \
            '            0' \
            '        )' \
            '' \
            '        smart_money_score = row.get(' \
            '            "smart_money_score",' \
            '            0' \
            '        )' \
            '' \
            '        breakout_score = row.get(' \
            '            "breakout_score",' \
            '            0' \
            '        )' \
            '' \
            '        if (' \
            '            institutional_score >= 75' \
            '            and smart_money_score >= 70' \
            '            and breakout_score >= 80' \
            '        ):' \
            '' \
            '            return "STRONG_BUY"' \
            '' \
            '        elif institutional_score >= 60:' \
            '' \
            '            return "BUY"' \
            '' \
            '        elif institutional_score <= 30:' \
            '' \
            '            return "SELL"' \
            '' \
            '        return "HOLD"' \
            '' \
            '    except Exception:' \
            '' \
            '        return "HOLD"' \
            > strategy/trade_decision_engine.py

          fi

      # =====================================================
      # SET PYTHONPATH
      # =====================================================

      - name: Set PYTHONPATH
        run: |

          echo "PYTHONPATH=${{ github.workspace }}" >> $GITHUB_ENV

      # =====================================================
      # RUN PIPELINE
      # =====================================================

      - name: Run Institutional Pipeline
        run: |

          python -m pipelines.daily_pipeline

      # =====================================================
      # VERIFY OUTPUT FILES
      # =====================================================

      - name: Verify Generated Files
        run: |

          echo "Generated Files:"
          find data -type f | sort || true

          echo ""
          echo "Processed Files:"
          ls -lh data/processed/ || true

      # =====================================================
      # UPLOAD ARTIFACTS
      # =====================================================

      - name: Upload Processed Data
        uses: actions/upload-artifact@v4
        with:
          name: institutional-data
          path: |
            data/processed/
            data/parquet/

      # =====================================================
      # GIT STATUS
      # =====================================================

      - name: Git Status
        run: |

          git status

      # =====================================================
      # COMMIT CHANGES
      # =====================================================

      - name: Commit Updated Files
        run: |

          git config --global user.name "github-actions[bot]"

          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add data/
          git add strategy/

          git diff --staged --quiet || git commit -m "Auto update institutional datasets"
            # =====================================================
      # FAILURE ALERT
      # =====================================================

      - name: Notify Failure
        if: failure()
        run: |

          echo "===================================="
          echo "PIPELINE FAILED"
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "===================================="

      # =====================================================
      # SUCCESS ALERT
      # =====================================================

      - name: Notify Success
        if: success()
        run: |

          echo "===================================="
          echo "PIPELINE COMPLETED SUCCESSFULLY"
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "===================================="
      # =====================================================
      # PUSH CHANGES
      # =====================================================

      - name: Push Changes
        run: |

          git push origin HEAD:${{ github.ref_name }}
