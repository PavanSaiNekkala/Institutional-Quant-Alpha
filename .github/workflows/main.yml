name: Institutional Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

concurrency:
  group: institutional-pipeline
  cancel-in-progress: false

jobs:
  institutional-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Display Environment Info
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo ""
          echo "Python Version:"
          python --version
          echo ""
          echo "Current Working Directory:"
          pwd

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Python Packages
        run: |
          python -c "import pandas; print('PANDAS OK')"
          python -c "import numpy; print('NUMPY OK')"
          python -c "import yfinance; print('YFINANCE OK')"
          python -c "import pyarrow; print('PYARROW OK')"

      - name: Create Project Structure
        run: |
          mkdir -p pipelines
          mkdir -p strategy
          mkdir -p data/parquet
          mkdir -p data/raw
          mkdir -p data/cache
          mkdir -p data/processed
          mkdir -p data/processed/scanners
          touch pipelines/__init__.py
          touch strategy/__init__.py

      - name: Refresh Cache Data
        run: |
          find data/cache -type f -mtime +1 -delete || true

      - name: Verify Required Files
        run: |
          if [ ! -f pipelines/daily_pipeline.py ]; then
            echo "ERROR: pipelines/daily_pipeline.py NOT FOUND"
            exit 1
          fi

          if [ ! -f pipelines/generate_scanners.py ]; then
            echo "ERROR: pipelines/generate_scanners.py NOT FOUND"
            exit 1
          fi

          if [ ! -f strategy/trade_decision_engine.py ]; then
            echo "Creating default trade_decision_engine.py"
            printf '%s\n' \
              'def trade_decision(row):' \
              '    return "HOLD"' \
              > strategy/trade_decision_engine.py
          fi

      - name: Set PYTHONPATH
        run: |
          echo "PYTHONPATH=${{ github.workspace }}" >> $GITHUB_ENV

      - name: Run Institutional Pipeline
        run: |
          python -m pipelines.daily_pipeline

      - name: Generate Stock Scanners
        run: |
          python pipelines/generate_scanners.py

      - name: Verify Generated Files
        run: |
          echo "Generated Files:"
          find data -type f | sort || true
          echo ""
          echo "Processed Files:"
          ls -lh data/processed/ || true
          echo ""
          echo "Scanner Files:"
          ls -lh data/processed/scanners/ || true

      - name: Upload Processed Data
        uses: actions/upload-artifact@v4
        with:
          name: institutional-data
          path: |
            data/processed/
            data/parquet/
          retention-days: 7

      - name: Git Status
        run: |
          git status

      - name: Commit Updated Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git add strategy/
          git diff --staged --quiet || git commit -m "Auto update institutional datasets"

      - name: Push Changes
        run: |
          git push origin HEAD:${{ github.ref_name }}

      - name: Telegram Success Alert
        if: success()
        continue-on-error: true
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="✅ Institutional Pipeline Successful

Repository: ${{ github.repository }}

Branch: ${{ github.ref_name }}

Run ID: ${{ github.run_id }}

Hourly refresh completed successfully."

      - name: Telegram Failure Alert
        if: failure()
        continue-on-error: true
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="❌ Institutional Pipeline FAILED

Repository: ${{ github.repository }}

Branch: ${{ github.ref_name }}

Run ID: ${{ github.run_id }}

Check GitHub Actions logs immediately."
