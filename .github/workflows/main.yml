name: Institutional Pipeline

on:
  workflow_dispatch:

  schedule:
    - cron: "30 2 * * *"

permissions:
  contents: write

concurrency:
  group: institutional-pipeline
  cancel-in-progress: false

jobs:

  institutional-pipeline:

    runs-on: ubuntu-latest

    timeout-minutes: 360

    steps:

      # =====================================================
      # CHECKOUT
      # =====================================================

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =====================================================
      # PYTHON SETUP
      # =====================================================

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # =====================================================
      # INSTALL DEPENDENCIES
      # =====================================================

      - name: Install Dependencies
        run: |

          python -m pip install --upgrade pip

          pip install -r requirements.txt

      # =====================================================
      # VERIFY PACKAGES
      # =====================================================

      - name: Verify Python Packages
        run: |

          python -c "import pandas; print('PANDAS OK')"

          python -c "import numpy; print('NUMPY OK')"

          python -c "import yfinance; print('YFINANCE OK')"

          python -c "import pyarrow; print('PYARROW OK')"

      # =====================================================
      # CREATE DATA DIRECTORIES
      # =====================================================

      - name: Create Data Directories
        run: |

          mkdir -p data/parquet
          mkdir -p data/raw
          mkdir -p data/cache

      # =====================================================
      # RUN PIPELINE
      # =====================================================

      - name: Run Institutional Pipeline
        run: |

          python -m pipelines.daily_pipeline

      # =====================================================
      # VERIFY OUTPUT FILES
      # =====================================================

      - name: Verify Generated Files
        run: |

          echo "Generated Files:"
          find data -type f | sort

          echo ""
          echo "Parquet Files:"
          ls -lh data/parquet/ || true

      # =====================================================
      # COMMIT GENERATED FILES
      # =====================================================

      - name: Commit Updated Files
        run: |

          git config --global user.name "github-actions[bot]"

          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add data/

          git diff --staged --quiet || git commit -m "Auto update institutional datasets"

      # =====================================================
      # PUSH CHANGES
      # =====================================================

      - name: Push Changes
        run: |

          git push origin HEAD:${{ github.ref_name }}
